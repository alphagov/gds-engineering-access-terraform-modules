name: Validate

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: read
  pull-requests: write

jobs:
  pre-commit-checks:
    uses: alphagov/gds-github-workflows/.github/workflows/terraform-pre-commit-checks.yml@12375fdc3ca4fccfe3e3e3fa02796ded31037a2d # v0.0.8
    permissions:
      contents: read
    with:
      terraform-version: ${{ vars.TERRAFORM_VERSION || null }} # defined by reusable workflow if not set
