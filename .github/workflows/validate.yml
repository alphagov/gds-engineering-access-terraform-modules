name: Validate

on:
  push:
    branches: []
  pull_request:
    branches:
    - main

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install terraform and dependencies
      uses: alphagov/gds-github-workflows/terraform/deps@actions/cache-python

    - name: Run pre-commit
      uses: alphagov/gds-github-workflows/pre-commit@actions/cache-python
