name: Validate

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

# NOTE: This declaration defaults all GH other permissions to none.
# - Create subsequent permissions scoped to job only after confirming with a techlead
# - Declaration here follows the policy defined in ADR-EA007
permissions:
  contents: none # Set so other permissions take the value 'none' by default
  id-token: none # Prevent OIDC token generation (‘none’ is the default)
  packages: none # Prevent package access (‘none’ is the default)

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install terraform and dependencies
      uses: alphagov/gds-tech-and-security-github-actions/terraform/deps@7b4a3ee296ab78c4cfa5aec390d6c5a989d7c601 # v0.1.10

    - name: Run pre-commit
      uses: alphagov/gds-tech-and-security-github-actions/pre-commit@7b4a3ee296ab78c4cfa5aec390d6c5a989d7c601 # v0.1.10
