name: Validate

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

# NOTE: This declaration defaults all GH other permissions to none.
# - Create subsequent permissions scoped to job only after confirming with a techlead
# - Declaration here follows the policy defined in ADR-EA007
permissions:
  contents: none # Set so other permissions take the value 'none' by default
  id-token: none # Prevent OIDC token generation (‘none’ is the default)
  packages: none # Prevent package access (‘none’ is the default)

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install terraform and dependencies
      uses: alphagov/gds-tech-and-security-github-actions/terraform/deps@195d742673ad36cd67aa1dd8847974d034668d1a # v0.1.17

    - name: Run pre-commit
      uses: alphagov/gds-tech-and-security-github-actions/pre-commit@195d742673ad36cd67aa1dd8847974d034668d1a # v0.1.17
