name: Validate

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: read

jobs:
  terraform-pre-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install terraform and dependencies
      uses: alphagov/gds-github-workflows/terraform/deps@12375fdc3ca4fccfe3e3e3fa02796ded31037a2d # v0.0.8
      with:
        terraform-version: ${{ vars.TERRAFORM_VERSION || null }} # defined by reusable workflow if not set

    - name: Run pre-commit
      uses: alphagov/gds-github-workflows/pre-commit@12375fdc3ca4fccfe3e3e3fa02796ded31037a2d # v0.0.8
